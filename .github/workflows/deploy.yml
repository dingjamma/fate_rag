name: CI/CD — Fate RAG Chatbot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'   # Required for AWS CDK CLI

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            --tb=short \
            --verbose \
            -x
        env:
          # Minimal env vars needed by tests (no real AWS calls in unit tests)
          AWS_REGION: us-east-1
          BEDROCK_REGION: us-east-1
          OPENSEARCH_ENDPOINT: http://localhost:9200
          OPENSEARCH_INDEX: fate-lore
          USE_AWS_AUTH: 'false'

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js (for CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r infra/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap (idempotent)
        run: |
          cdk bootstrap \
            aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }} \
            --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: CDK Deploy
        run: |
          ENV=${{ github.event.inputs.environment || 'dev' }}
          cdk deploy --app "python3 infra/app.py" \
            --context env=$ENV \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ secrets.AWS_REGION || 'us-east-1' }} \
            --require-approval never \
            --outputs-file cdk-outputs.json
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: cdk-outputs.json
          retention-days: 7
